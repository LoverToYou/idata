server:
  port: 8088
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: 20MB

spring:
  application:
    name: idata

  datasource:
    url: jdbc:mysql://localhost:3306/idata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: idata
    password: Idata@123!
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.idata.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# DataX 安装路径配置
logging:
  level:
    com.mysql.cj.jdbc: DEBUG
    com.mysql.cj: TRACE

idata:
  datax:
    home: /opt/datax
  encryption:
    key: idata-secret-key-2024
